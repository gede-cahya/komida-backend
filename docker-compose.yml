version: '3.8'

services:
  backend:
    build: .
    container_name: komida-backend
    ports:
      - "3001:3001"
    volumes:
      - ./komida.db:/app/komida.db
    restart: always

  imageproxy:
    build:
      context: .
      dockerfile: Dockerfile.imageproxy
    container_name: komida-imageproxy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      IMAGE_PROXY_ADDR: ":3482"
      IMAGE_PROXY_CACHE_DIR: /var/lib/komida/image-cache
    ports:
      - "3482:3482"
    volumes:
      - ./cache/images-go:/var/lib/komida/image-cache
    restart: always

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: komida-tunnel
    command: tunnel --config /etc/cloudflared/config-docker.yml run komida-api
    volumes:
      - /home/cahya/.cloudflared:/etc/cloudflared:ro
    depends_on:
      - backend
      - imageproxy
    restart: always
